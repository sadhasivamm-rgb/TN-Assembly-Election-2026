<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Big Fights | TN Election 2026</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/navbar.css" />
    <link rel="stylesheet" href="../css/bigfights.css" />
  </head>

  <body data-page="bigfights">
    <div id="navbar-container"></div>

    <main>
      <section class="bigfights-page">

        <!-- Filter Tabs -->
        <div class="bigfight-tabs">
          <button class="bigfight-tab bigfight-tab--active" data-filter="all">
            Big Fights
          </button>
          <button class="bigfight-tab" data-filter="popular">
            Popular Battles
          </button>
          <div class="candidates-search">
            <svg class="candidates-search__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input
              type="text"
              id="candidates-search-input"
              class="candidates-search__input"
              placeholder="Search Candidate"
              autocomplete="off"
            />
          </div>
        </div>

        <!-- Cards injected by JS -->
        <div id="bigfight-cards-container"></div>

      </section>
    </main>

    <!-- SCRIPTS — order matters -->
    <script src="../data/navbar.js"></script>
    <script src="../data/bigfights.js"></script>
    <script src="../data/popular-battles.js"></script>

    <script src="../js/components/navbar.js"></script>
    <script src="../js/bigfights/bigfight-cards.js"></script>
    <script src="../js/bigfights/popular-battles.js"></script>

  </body>
</html>
