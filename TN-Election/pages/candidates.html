<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Candidates | TN Election 2026</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/navbar.css" />
    <link rel="stylesheet" href="../css/candidates.css" />
  </head>

  <body data-page="candidates">
    <div id="navbar-container"></div>

    <main>
      <div class="candidates-page">

        <!-- Header -->
        <div class="candidates-header">
          <h1 class="candidates-header__title">Candidate Details</h1>
          <div class="candidates-search">
            <svg class="candidates-search__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input
              type="text"
              id="candidates-search-input"
              class="candidates-search__input"
              placeholder="Search Candidate"
              autocomplete="off"
            />
          </div>
        </div>

        <!-- Search -->

        <!-- Filter Tabs -->
        <div class="candidates-tabs" role="tablist">
          <button class="candidates-tab candidates-tab--active" data-tab="popular"      role="tab" aria-selected="true">Popular Candidates</button>
          <button class="candidates-tab"                        data-tab="celebrity"    role="tab" aria-selected="false">Celebrity Candidates</button>
          <button class="candidates-tab"                        data-tab="experienced"  role="tab" aria-selected="false">Experienced Candidates</button>
          <button class="candidates-tab"                        data-tab="professional" role="tab" aria-selected="false">Professional Candidates</button>
        </div>

        <!-- Candidates Grid -->
        <div class="candidates-grid" id="candidates-grid">
          <!-- Cards injected by JS -->
        </div>

      </div>
    </main>

    <!-- Scripts — ORDER MATTERS -->

    <!-- Step 1: Data files -->
    <script src="../data/navbar.js"></script>
    <script src="../data/candidates.js"></script>
    <script src="../data/all-candidates.js"></script>

    <!-- Step 2: Components -->
    <script src="../js/components/navbar.js"></script>

    <!-- Step 3: Page modules -->
    <script src="../js/candidates/candidate-cards.js"></script>
    <script src="../js/candidates/filter-tabs.js"></script>
    <script src="../js/candidates/candidate-popup.js"></script>

  </body>
</html>
